name: Sandbox Test

on:
  pull_request:
    paths:
      - "sandbox/**"
  push:
    branches: [main]
    paths:
      - "sandbox/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash sandbox/test.sh
